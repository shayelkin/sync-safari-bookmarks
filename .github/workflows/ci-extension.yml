name: CI (extension)

on:
  push:
    branches: [main]
    paths:
      - extension/**
      - .github/workflows/ci-extension.yml
  pull_request:
    branches: [main]
    paths:
      - extension/**
      - .github/workflows/ci-extension.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Check JS syntax
        run: |
          for f in extension/*.js; do
            node --input-type=module --check < "$f"
          done

      - name: Validate Chrome MV3 manifest
        run: uv tool run check-jsonschema --schemafile https://json.schemastore.org/chrome-manifest.json extension/manifest.json
